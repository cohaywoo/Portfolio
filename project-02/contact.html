<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Colton Haywood</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <p class="eyebrow">Contact</p>
        <h1>Ready to connect?</h1>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="projects.html">Projects</a>
          <a class="active" href="contact.html">Contact</a>
        </nav>
      </header>

      <main>
        <section class="content-panel">
          <h2>Contact details</h2>
          <p>
            I’m available to discuss new front-end projects, portfolio updates,
            and collaboration opportunities.
          </p>
          <ul class="contact-list">
            <li>Email: <a href="mailto:cohaywoo@ttu.edu">cohaywoo@ttu.edu</a></li>
            <li>Location: Lubbock, Texas</li>
          </ul>
        </section>

        <section class="content-panel">
          <h2>Send a message</h2>
          <form class="contact-form">
            <label>
              Name
              <input type="text" placeholder="Your name" />
            </label>
            <label>
              Email
              <input type="email" placeholder="you@example.com" />
            </label>
            <label>
              Message
              <textarea rows="5" placeholder="How can I help?"></textarea>
            </label>
            <button type="submit">Send Message</button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; 2026 Colton Haywood</p>
      </footer>
    </div>
  </body>
</html>
